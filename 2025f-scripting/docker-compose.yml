services:
  web:
    build: .
    volumes:
      - ./msanh:/app
    environment:
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,web,scripting-project-f2025.aaanh.app
    expose:
      - "8000"
    command: sh -c "python manage.py collectstatic --noinput && gunicorn --bind 0.0.0.0:8000 msanh.wsgi:application"

  nginx:
    build: ./nginx
    ports:
      - "0.0.0.0:8080:80"
    volumes:
      - ./msanh/staticfiles:/staticfiles:ro
    depends_on:
      - web