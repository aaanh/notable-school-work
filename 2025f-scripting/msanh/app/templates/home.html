{% extends "base.html" %}

{% block title %}Home - Anh's Blog{% endblock %}

{% block content %}
<header class="mb-12">
  <nav class="flex justify-between items-center">
    <a href="{% url 'home' %}" class="text-4xl font-semibold" style="color: #1a252f;">Anh's Blog</a>
    <div class="space-x-6">
      <a href="{% url 'home' %}" class="font-medium" style="color: #3498db;">Home</a>
      <a href="{% url 'contact' %}" style="color: #7f8c8d;">Contact</a>
    </div>
  </nav>
</header>

<h1 class="text-2xl font-bold mb-6" style="color: #1a252f;">Posts</h1>

<ol class="lg:columns-3 columns-1 break-inside-avoid gap-8 list-decimal list-inside space-y-4">
  {% for post in posts %}
  <div>
    <a href="{% url 'post' slug=post.slug %}" class="hover:underline" style="color: #3498db;">
      <li class="border p-4 rounded-lg" style="border-color: #bdc3c7;">
        {{ post.title }}
      </li>
    </a>
  </div>
  {% empty %}
  <li>No posts found.</li>
  {% endfor %}
</ol>
{% endblock %}
